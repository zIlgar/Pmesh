<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pmesh Telemetry Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- Header -->
    <header class="top-nav">
        <div class="logo">
            <span class="logo-icon"></span>
            <h1>Pmesh <span>Monitoring Console</span></h1>
        </div>
        <div class="system-status">
            <div class="status-indicator online"></div>
            <span>System Active</span>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="dashboard-grid">

        <!-- Sidebar: Device List -->
        <aside class="sidebar card">
            <h2>Active Rovers</h2>
            <ul id="device-list" class="device-list">
                <!-- Devices injected via JS -->
                <li class="empty-state">No rovers connected.</li>
            </ul>
        </aside>

        <!-- Main Viewing Area -->
        <main class="main-viewer card">

            <!-- 3D Factory Map Background -->
            <div class="factory-map-container">
                <img src="/static/factory_map.jpg" alt="3D Factory Map" class="factory-map-image">

                <!-- Rover Map Markers -->
                <div class="rover-marker" data-rover="Rover-01" style="top: 30%; left: 20%;">
                    <div class="marker-dot"></div><span class="marker-label">Rover-01</span>
                </div>
                <div class="rover-marker" data-rover="Rover-02" style="top: 25%; left: 75%;">
                    <div class="marker-dot"></div><span class="marker-label">Rover-02</span>
                </div>
                <div class="rover-marker" data-rover="Rover-03" style="top: 70%; left: 80%;">
                    <div class="marker-dot"></div><span class="marker-label">Rover-03</span>
                </div>
                <div class="rover-marker" data-rover="Rover-04" style="top: 80%; left: 25%;">
                    <div class="marker-dot"></div><span class="marker-label">Rover-04</span>
                </div>
                <div class="rover-marker" data-rover="Rover-05" style="top: 50%; left: 50%;">
                    <div class="marker-dot"></div><span class="marker-label">Rover-05</span>
                </div>
            </div>

            <!-- Floating PiP Overlay -->
            <div class="pip-overlay-card">
                <div class="viewer-header">
                    <h2 id="active-device-title">Select a Rover</h2>

                    <!-- View Controls -->
                    <div class="view-controls" style="display: none;" id="view-controls">
                        <button class="btn active" data-view="standard">Standard</button>
                        <button class="btn" data-view="thermal">Thermal</button>
                        <button class="btn" data-view="split">Split Screen</button>
                    </div>
                </div>

                <div class="stream-container" id="stream-container">
                    <div class="empty-state" id="stream-empty">Waiting for video feeds...</div>

                    <!-- Video Elements -->
                    <div class="feed-wrapper" id="feed-standard" style="display: none;">
                        <div class="feed-label">RGB Feed</div>
                        <img id="img-standard" alt="Standard Video Feed">
                    </div>

                    <div class="feed-wrapper" id="feed-thermal" style="display: none;">
                        <div class="feed-label alert-color">Thermal Filter</div>
                        <img id="img-thermal" alt="Thermal Video Feed">
                    </div>
                </div>
            </div>
        </main>

        <!-- Sidebar: Alerts & Telemetry Log -->
        <aside class="telemetry-panel card">
            <h2>Telemetry Log</h2>
            <div class="telemetry-stats" id="telemetry-stats" style="display: none;">
                <div class="stat-box">
                    <span class="label">CPU Temp</span>
                    <span class="value" id="stat-cpu-temp">-- &deg;C</span>
                </div>
                <div class="stat-box">
                    <span class="label">Status</span>
                    <span class="value status-good" id="stat-status">Active</span>
                </div>
            </div>

            <div class="alerts-log" id="alerts-log">
                <!-- Logs injected via JS -->
            </div>
        </aside>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/app.js"></script>
</body>

</html>
